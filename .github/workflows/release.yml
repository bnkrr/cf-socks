name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  actions: read
  contents: write

jobs:
  build:
    name: Build Release Assets
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Node dependencies
        run: npm ci

      - name: Build dashboard Worker
        run: npm run worker:bundle-dashboard

      - name: Build agent
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          name="cf-socks-agent-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -trimpath -buildvcs=false -ldflags="-s -w" -o "dist/${name}" ./cmd/cf-socks-agent

      - name: Package agent
        run: |
          cd dist
          asset="cf-socks-agent-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "${asset}.zip" "${asset}.exe"
            rm "${asset}.exe"
          else
            tar -czf "${asset}.tar.gz" "${asset}"
            rm "${asset}"
          fi

      - name: Include dashboard Worker once
        if: matrix.goos == 'linux' && matrix.goarch == 'amd64'
        run: cp worker/single-file.js dist/cf-socks-worker-dashboard.js

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -la dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: dist/*
          generate_release_notes: true
          overwrite_files: true
